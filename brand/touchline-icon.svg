<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Touchline">
  <defs>
    <linearGradient id="tlBg" x1="128" y1="40" x2="384" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D26A4F"/>
      <stop offset="1" stop-color="#A5382B"/>
    </linearGradient>
  </defs>

  <!-- app-icon squircle -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#tlBg)"/>

  <!-- management / tracking ring (open at the bottom) -->
  <path d="M 181 385.9 A 150 150 0 1 1 331 385.9"
        fill="none" stroke="#FFF6F2" stroke-width="20" stroke-linecap="round" opacity="0.95"/>

  <!-- soccer ball -->
  <circle cx="256" cy="256" r="118" fill="#FFFFFF"/>

  <g stroke="#A5382B" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- radial seams from the center pentagon out to the ball edge -->
    <path d="M256 212 L256 150"/>
    <path d="M297.8 242.4 L356.8 223.2"/>
    <path d="M281.9 291.6 L318.3 341.8"/>
    <path d="M230.1 291.6 L193.7 341.8"/>
    <path d="M214.2 242.4 L155.2 223.2"/>
    <!-- center pentagon -->
    <path d="M256 212 L297.8 242.4 L281.9 291.6 L230.1 291.6 L214.2 242.4 Z" fill="#A5382B"/>
  </g>
</svg>
